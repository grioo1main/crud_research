spring:
  application:
    name: server-analyzer

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/analyzer_db
    username: analyzer_user
    password: analyzer_pass
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

---
# Профиль для Docker
spring:
  config:
    activate:
      on-profile: docker
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/analyzer_db}
    username: ${SPRING_DATASOURCE_USERNAME:analyzer_user}
    password: ${SPRING_DATASOURCE_PASSWORD:analyzer_pass}